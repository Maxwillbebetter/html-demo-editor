name: Build Desktop Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to upload packages to, for example v0.1.0'
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke test asset copy
        run: npm run test:assets

      - name: Smoke test import/export
        run: npm run test:smoke

      - name: UI smoke test
        run: npm run test:ui

      - name: Build macOS app
        run: npm run dist:mac

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: html-demo-editor-macos
          path: |
            release/*.dmg
            release/*.zip

      - name: Upload macOS package to release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Desktop packages for HTML Demo Editor $RELEASE_TAG." || true
          gh release upload "$RELEASE_TAG" release/*.dmg release/*.zip --clobber

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke test asset copy
        run: npm run test:assets

      - name: Smoke test import/export
        run: npm run test:smoke

      - name: UI smoke test
        run: npm run test:ui

      - name: Build Windows app
        run: npm run dist:win

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: html-demo-editor-windows
          path: release/*.exe

      - name: Upload Windows package to release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          gh release view "$env:RELEASE_TAG" > $null 2>&1
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" --title "$env:RELEASE_TAG" --notes "Desktop packages for HTML Demo Editor $env:RELEASE_TAG."
          }
          gh release upload "$env:RELEASE_TAG" release/*.exe --clobber

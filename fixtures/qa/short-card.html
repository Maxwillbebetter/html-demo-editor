<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短页卡片测试</title>
  <style>
    body {
      margin: 0;
      background: #f4f0e8;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .poster {
      width: 960px;
      min-height: 620px;
      padding: 72px;
      color: #18202b;
      background: #fffdfa;
    }
    h1 {
      margin: 0;
      font-size: 72px;
      line-height: 1.05;
    }
    p {
      max-width: 680px;
      font-size: 24px;
      line-height: 1.55;
      color: #58616f;
    }
    .badge {
      display: inline-block;
      margin-bottom: 22px;
      padding: 8px 12px;
      color: #0f766e;
      background: #dff5ef;
      border-radius: 8px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="poster">
    <div class="badge">SHORT HTML</div>
    <h1>短页 HTML 保真测试</h1>
    <p>这个文件用于测试单屏短内容是否默认作为大 HTML 文档导入，而不是被强行变成 PPT 分页。</p>
  </main>
</body>
</html>
